<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Claude 額度監控</title>
<meta name="theme-color" content="#0f1115">
<link rel="manifest" href="manifest.webmanifest">
<link rel="apple-touch-icon" href="icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Claude 額度">
<style>
  :root{
    --bg:#0f1115; --panel:#181b22; --panel2:#20242e; --line:#2a2f3a;
    --txt:#e8ebf1; --dim:#9aa3b2; --accent:#d97757; --accent2:#c96442;
    --ok:#3fb56b; --warn:#e0a83a; --bad:#e05a5a;
    --radius:18px;
  }
  @media (prefers-color-scheme: light){
    :root{ --bg:#f4f4f2; --panel:#fff; --panel2:#f0efec; --line:#e2e0da;
           --txt:#1e1f22; --dim:#6b7180; }
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent}
  html,body{margin:0}
  body{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans TC",sans-serif;
    background:var(--bg); color:var(--txt);
    padding:env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    line-height:1.5;
  }
  .wrap{max-width:640px; margin:0 auto; padding:20px 16px 48px}
  header{display:flex; align-items:center; justify-content:space-between; gap:12px; margin-bottom:4px}
  .brand{display:flex; align-items:center; gap:10px; font-weight:700; font-size:19px}
  .dot{width:11px; height:11px; border-radius:50%; background:var(--accent)}
  .plan{font-size:13px; color:var(--dim)}
  .plan b{color:var(--txt)}
  .stale{color:var(--warn)}

  .card{
    background:var(--panel); border:1px solid var(--line); border-radius:var(--radius);
    padding:18px; margin-top:16px;
  }
  .card h2{margin:0 0 2px; font-size:15px; display:flex; align-items:center; justify-content:space-between}
  .sub{font-size:12px; color:var(--dim); margin-bottom:14px}

  .gauge{display:flex; align-items:center; gap:18px}
  .ring{position:relative; width:120px; height:120px; flex:0 0 auto}
  .ring svg{transform:rotate(-90deg)}
  .ring .val{position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center}
  .ring .pct{font-size:26px; font-weight:800; letter-spacing:-.5px}
  .ring .cap{font-size:10px; color:var(--dim); margin-top:-2px}
  .meta{flex:1; min-width:0}
  .row{display:flex; justify-content:space-between; font-size:13px; padding:5px 0; border-bottom:1px dashed var(--line)}
  .row:last-child{border-bottom:none}
  .row .k{color:var(--dim)}
  .row .v{font-weight:600; font-variant-numeric:tabular-nums}
  .count{font-size:22px; font-weight:800; font-variant-numeric:tabular-nums; letter-spacing:.5px}

  .edit{margin-top:14px; display:flex; gap:8px; flex-wrap:wrap}
  button{
    font:inherit; cursor:pointer; border-radius:12px; border:1px solid var(--line);
    background:var(--panel2); color:var(--txt); padding:9px 14px; font-size:13px; font-weight:600;
  }
  button.primary{background:var(--accent); border-color:var(--accent); color:#fff}
  button.ghost{background:transparent}
  button:active{transform:scale(.97)}
  .btns{display:flex; gap:8px; flex-wrap:wrap; margin-top:16px}

  .field{margin:12px 0}
  .field label{display:block; font-size:12px; color:var(--dim); margin-bottom:5px}
  input,select{
    width:100%; font:inherit; padding:11px 12px; border-radius:12px;
    border:1px solid var(--line); background:var(--bg); color:var(--txt);
  }
  .slider-row{display:flex; align-items:center; gap:12px}
  input[type=range]{accent-color:var(--accent)}
  .big{font-size:28px; font-weight:800; min-width:74px; text-align:right; font-variant-numeric:tabular-nums}

  dialog{
    border:none; border-radius:20px 20px 0 0; background:var(--panel); color:var(--txt);
    padding:20px; width:100%; max-width:640px; margin:auto auto 0; border:1px solid var(--line);
  }
  dialog::backdrop{background:rgba(0,0,0,.5)}
  @media(min-width:641px){ dialog{border-radius:20px; margin:auto} }
  .foot{font-size:11px; color:var(--dim); text-align:center; margin-top:26px; line-height:1.7}
  .foot a{color:var(--accent); text-decoration:none}
  .pill{display:inline-block; font-size:11px; padding:2px 8px; border-radius:20px; background:var(--panel2); color:var(--dim); margin-left:6px}
  .hint{font-size:12px; color:var(--dim); background:var(--panel2); border-radius:12px; padding:10px 12px; margin-top:10px}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="brand"><span class="dot"></span>Claude 額度監控</div>
    <div class="plan">方案 <b id="planName">Max</b></div>
  </header>
  <div class="plan" id="updated" style="margin-bottom:2px"></div>

  <div id="cards"></div>

  <div class="btns">
    <button class="primary" id="btnRefresh">↻ 從 claude.ai 對數字</button>
    <button id="btnAdd">＋ 新增視窗</button>
    <button id="btnSync">☁ 雲端同步</button>
    <button class="ghost" id="btnSettings">⚙ 設定</button>
  </div>

  <div class="hint" id="installHint" style="display:none">
    📱 手機安裝:Safari 按 <b>分享 → 加入主畫面</b>;Android Chrome 按 <b>⋮ → 安裝應用程式</b>。
  </div>

  <div class="foot">
    reset 時間為裝置本地自動倒數 · 剩餘 % 需偶爾對照官方頁面<br>
    <a href="https://claude.ai/settings/usage" target="_blank" rel="noopener">開啟 claude.ai/settings/usage ↗</a>
  </div>
</div>

<!-- 編輯某一視窗 -->
<dialog id="editDlg">
  <h2 style="margin:0 0 14px" id="editTitle">編輯視窗</h2>
  <div class="field">
    <label>目前已使用比例</label>
    <div class="slider-row">
      <input type="range" id="usedRange" min="0" max="100" step="1">
      <span class="big"><span id="usedNum">0</span>%</span>
    </div>
  </div>
  <div class="field">
    <label id="resetLabel">下次 reset 時間(填 claude.ai 顯示的 "resets at")</label>
    <input type="datetime-local" id="resetAt">
  </div>
  <div class="hint" id="periodHint"></div>
  <div class="btns">
    <button class="primary" id="editSave">儲存</button>
    <button class="ghost" id="editCancel">取消</button>
  </div>
</dialog>

<!-- 設定 -->
<dialog id="setDlg">
  <h2 style="margin:0 0 14px">設定</h2>
  <div class="field">
    <label>方案名稱</label>
    <input id="setPlan" placeholder="Max 20x">
  </div>
  <div class="field">
    <label>雲端同步 JSON 網址(選填,桌機採集器推送、手機讀取)</label>
    <input id="setSync" placeholder="https://.../data.json">
  </div>
  <div class="btns">
    <button class="primary" id="setSave">儲存</button>
    <button id="setExport">匯出 JSON</button>
    <button id="setImport">匯入 JSON</button>
    <button class="ghost" id="setClose">關閉</button>
  </div>
  <input type="file" id="fileImport" accept="application/json" hidden>
</dialog>

<script src="app.js"></script>
</body>
</html>
